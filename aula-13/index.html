<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula-13</title>
    <style>
        .container01 {
            width: 100%;
            height: 100vh;
            display: flex;
            gap: 30px;
        }

        .box01 {
            width: 50%;
            height: 100%;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box02 {
            width: 50%;
            height: 100%;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e9e9e9;
        }

        .header01 {
            width: 70%;
            height: 60px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            border: 4px solid;
            border-color: #020268;
            border-radius: 8px;
        }

        .div01 {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background-color: #020268;
        }

        .div02 {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .block01 {
            width: 60px;
            height: 15px;
            border-radius: 8px;
            background-color: #020268;
        }

        .header02 {
            width: 70%;
            height: 260px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            border: 1px solid;
            border-color: #8a8a8a;
            border-radius: 8px;
            background-color: white;
        }

        .div03 {
            display: flex;
            gap: 16px;
        }

        .block02 {
            width: 25%;
            height: 15px;
            border-radius: 8px;
            background-color: #020268;
        }
    </style>
</head>

<body>
    <div class="container01">
        <div class="box01">
            <div class="header01">
                <div class="div01"></div>
                <div class="div02">
                    <div class="block01"></div>
                    <div class="block01"></div>
                    <div class="block01"></div>
                </div>
            </div>
        </div>
        <div class="box02">
            <div class="header02">
                <div class="div03">
                    <div class="block02"></div>
                    <div class="block02"></div>
                    <div class="block02"></div>
                    <div class="block02"></div>
                </div>
                <div class="div03"></div>
                <div class="div03"></div>
            </div>
        </div>
    </div>
</body>

</html>
